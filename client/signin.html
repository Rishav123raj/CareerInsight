<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareerInsight - Sign In</title>
  <link rel="stylesheet" href="signin.css" />
  <link rel="icon" href="images/career.ico" />
  <script defer>
    async function handleSignIn(event) {
      event.preventDefault();
      const userName = document.getElementById("userName").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorText = document.getElementById("error-text");

      try {
        const response = await fetch("http://localhost:5000/api/auth/signin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ userName, email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem("userName", userName);
          alert("✅ Login successful!");
          window.location.href = "dashboard.html"; 
        } else {
          errorText.textContent = "❌ " + data.message || "Login failed";
        }
      } catch (error) {
        errorText.textContent = "❌ Server error. Try again later.";
        console.error(error);
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="form-section">
        <h2 class="logo">Welcome back ! 👋</h2>
        <p class="welcome">Login to your CareerInsight account </p>

        <form id="signin-form" onsubmit="handleSignIn(event)">
            <label for="userName">Full Name</label>
            <input type="text" id="userName" placeholder="Enter your full name" required />

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="login@mail.com" required />

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
          <p id="error-text"></p>
          <button type="submit" class="login-btn">LOGIN</button>

          <p class="signup-text">
            Don’t have an account yet? <a href="signup.html">Sign Up Here</a>
          </p>
        </form>
      </div>
      <div class="image-section">
        <img src="https://media.istockphoto.com/id/1178763127/vector/man-with-laptop-sitting-on-the-chair-freelance-or-studying-concept-cute-illustration-in-flat.jpg?s=612x612&w=0&k=20&c=gzk5c0q1DkndI2IFHIBCHIapEiFHm6JuG0-6C3xL-3I=" alt="Login Illustration" />
      </div>
    </div>
  </div>
</body>
</html>
