<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareerInsight - Sign Up</title>
  <link rel="stylesheet" href="signup.css">
  <link rel="icon" href="images/career.ico">
  <script defer>
    function validateForm(event) {
      event.preventDefault();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;
      const errorText = document.getElementById("error-text");

      if (password !== confirmPassword) {
        errorText.textContent = "❌ Passwords do not match!";
        return false;
      } else {
        errorText.textContent = "";
        // Submit form here (AJAX or form submission)
        alert("✅ Account created successfully!");
        document.getElementById("signup-form").reset();
        return true;
      }
    }
  </script>
</head>
<body>
  <div class="signup-container">
    <div class="signup-box">
      <h2>Create Your Account</h2>
      <p class="subtext">Join CareerInsight to unlock your career potential.</p>
      <form id="signup-form" onsubmit="validateForm(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
        </div>
        <p id="error-text"></p>
        <button type="submit" class="signup-button">Sign Up</button>
      </form>
      <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>
</body>
</html>
