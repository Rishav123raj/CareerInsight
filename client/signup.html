<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareerInsight - Sign Up</title>
  <link rel="stylesheet" href="signup.css">
  <link rel="icon" href="images/career.ico">
  <script defer>
  async function validateForm(event) {
    event.preventDefault();
    
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm-password").value;
    const errorText = document.getElementById("error-text");

    if (password !== confirmPassword) {
      errorText.textContent = "❌ Passwords do not match!";
      return;
    }

    try {
      const response = await fetch("http://localhost:5000/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, confirmPassword })
      });

      const result = await response.json();

      if (response.ok) {
        localStorage.setItem("userName", name); // Store name
        alert("✅ Account created successfully!");
        document.getElementById("signup-form").reset();
        errorText.textContent = "";
      } else {
        errorText.textContent = "❌ " + result.msg;
        console.error("Signup Error:", result.msg);
      }
    } catch (error) {
      errorText.textContent = "❌ Server error. Please try again later.";
      console.error("Fetch Error:", error);
    }
  }
</script>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="form-section">
        <form id="signup-form" onsubmit="validateForm(event)">
      <h2 class="logo">Create Your Account </h2>
      <h4>Join CareerInsight to unlock your career potential.</h4><br><br>

      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required />

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="login@mail.com" required />

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />

          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required />
          <p id="error-text"></p>
          <button type="submit" class="signin-btn">Register</button>

          <p class="signin-text">
            Already have an account ? <a href="signin.html">Sign In Here</a>
          </p>
        </form>
      </div>
      <div class="image-section">
        <img src="https://img.freepik.com/premium-vector/woman-with-laptop-showing_126609-931.jpg?semt=ais_hybrid&w=740" alt="Login Illustration" />
      </div>
    </div>
  </div>
</body>
</html>
